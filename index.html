<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                <img class="nav__logo" src="Library.svg" alt="">
                <ul class="nav__links">
                    <li><a href="#" class="nav__link">Home</a></li>
                    <li><a href="#" class="nav__link">Contact</a></li>
                    <li><a href="#" class="nav__link nav__link--primary">Books</a></li>
                </ul>
            </div>
        </nav>
        <header>
            <div class="header__container">
                <div class="header__description">
                    <h1>America's Most Awarded Online Library Platform</h1>
                    <h2>Find Your Dream Book With <span class="purple">Library</span></h2>
                    <button class="btn">Browse Books</button>
                </div>
                <figure class="header__img--wrapper">
                    <img src="Undraw_Books.svg" alt="">
                </figure>
            </div>
        </header>
    </section>
    <main>
        <section id="highlights">
            <div class="container">
                <div class="row">
                    <h2 class="section__title">
                        Why Choose <span class="purple">Library</span>
                    </h2>
                    <div class="highlight__wrapper">
                        <div class="highlight">
                            <div class="highlight__image">
                                <i class="fa-solid fa-bolt-lightning"></i>
                                <h3 class="highlight__subtitle">
                                    Quick and Easy
                                </h3>
                                <p class="highlight__para">
                                    Get access to the book you purchased online instantly
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <section id="feautures">
                <div class="container">
                    <div class="row">

                    </div>
                </div>
                <section id="latest">
                    <div class="container">
                        <div class="row">

                        </div>
                    </div>
                </section>
    </main>

</body>

</html>
